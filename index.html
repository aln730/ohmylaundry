<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laundry Reporting</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

    <!-- Theme Switcher & Custom CSS -->
    <link rel="stylesheet" href="https://themeswitcher.csh.rit.edu/api/get" media="screen">
    <link rel="stylesheet" type="text/css" href="/static/style.css?v=1">

    <!-- JS Libraries -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" crossorigin="anonymous"></script>
    <script defer src="/static/home.js?v=1"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <a class="navbar-brand" href="#">Laundry Reporting</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="https://youtu.be/A43JOxLa5MM?si=a-w0rXfLmofpOXN8">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="https://zxcvhq.dev/">Contact Support</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Header -->
    <div class="header text-center my-5">
        <h1>Report a Laundry Issue</h1>
        <p class="lead">Scan the QR code below to submit a report quickly and efficiently.</p>
    </div>

    <!-- Laundry QR Code Section -->
    <div class="container text-center my-5">
        <div id="laundry_qr_code" style="display: inline-block;"></div>
        <p class="mt-3">Your report will go directly to the maintenance team.</p>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4 bg-light">
        <small>&copy; 2026 Laundry Reporting System</small>
    </footer>

    <!-- QR code library -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script>
        const laundryQRCode = new QRCodeStyling({
            width: 250,
            height: 250,
            data: "https://youtu.be/XqZsoesa55w?si=6qvQEV2aWNvVJu98", // Replace with your actual reporting URL
            dotsOptions: {
                color: "#007bff",
                type: "rounded"
            },
            backgroundOptions: {
                color: "#fff",
            }
        });

        laundryQRCode.append(document.getElementById("laundry_qr_code"));
    </script>

</body>
</html>
